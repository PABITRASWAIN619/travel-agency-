<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Destinations - TravelX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/destinations.css" />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  </head>

  <body>
    <!-- NAVBAR -->
    <header>
      <div class="logo">TravelX</div>

      <div class="menu-toggle" onclick="toggleMenu()">☰</div>

      <nav id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="destinations.html" class="active">Destinations</a>
        <a href="packages.html">Packages</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h1>Explore Destinations</h1>
      <p>Find your next dream place 🌍</p>
    </section>

    <!-- SEARCH -->
    <section class="search-box">
      <input
        type="text"
        id="search"
        placeholder="Search..."
        onkeyup="filterDest()"
      />
    </section>

    <!-- DESTINATIONS -->
    <section class="destinations">
      <div class="grid">
        <!-- CARD -->
        <div class="card" data-aos="fade-up">
          <img src="https://picsum.photos/400/300?paris" />
          <div class="info">
            <h3>Paris</h3>
            <p>France • ⭐ 5.0</p>
            <button onclick="goTo('booking.html')">Book Now</button>
          </div>
        </div>

        <div class="card" data-aos="fade-up">
          <img src="https://picsum.photos/400/300?bali" />
          <div class="info">
            <h3>Bali</h3>
            <p>Indonesia • ⭐ 4.8</p>
            <button onclick="goTo('booking.html')">Book Now</button>
          </div>
        </div>

        <div class="card" data-aos="fade-up">
          <img src="https://picsum.photos/400/300?goa" />
          <div class="info">
            <h3>Goa</h3>
            <p>India • ⭐ 4.5</p>
            <button onclick="goTo('booking.html')">Book Now</button>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p>© 2026 TravelX</p>
    </footer>

    <!-- JS (VERY IMPORTANT AT BOTTOM) -->
    <script src="js/script.js"></script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 1000,
        once: true,
      });
    </script>
  </body>
</html>
