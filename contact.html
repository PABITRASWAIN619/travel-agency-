<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact - TravelX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/contact.css" />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  </head>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <script>
    AOS.init({
      duration: 1000,
      once: true,
    });
  </script>
  <body>
    <!-- NAVBAR -->
    <header>
      <div class="logo">TravelX</div>

      <!-- HAMBURGER -->
      <div class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <nav id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="destinations.html">Destinations</a>
        <a href="packages.html">Packages</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <!-- CONTACT SECTION -->
    <section class="contact">
      <h1>Get In Touch ✈️</h1>
      <p class="sub">We’d love to hear from you!</p>

      <div class="contact-container">
        <!-- LEFT INFO -->
        <div class="contact-info">
          <div class="info-box">
            <i class="fas fa-envelope"></i>
            <p>travelx@gmail.com</p>
          </div>

          <div class="info-box">
            <i class="fas fa-phone"></i>
            <p>+91 8658302086</p>
          </div>

          <div class="info-box">
            <i class="fas fa-location-dot"></i>
            <p>Bhubaneswar, India</p>
          </div>

          <div class="social-icons">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-whatsapp"></i>
          </div>
        </div>

        <!-- RIGHT FORM -->
        <form class="contact-form" onsubmit="return validateForm();">
          <input type="text" id="name" placeholder="Your Name" required />
          <input type="email" id="email" placeholder="Your Email" required />
          <textarea id="message" placeholder="Your Message" required></textarea>

          <button type="submit">Send Message 🚀</button>
        </form>
      </div>
    </section>

    <!-- MAP -->
    <section class="map">
      <iframe
        src="https://maps.google.com/maps?q=Bhubaneswar&t=&z=13&ie=UTF8&iwloc=&output=embed"
      >
      </iframe>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 TravelX | All Rights Reserved</p>
      <div class="social-icons">
        <a href="https://facebook.com" target="_blank">
          <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://instagram.com" target="_blank">
          <i class="fab fa-instagram"></i>
        </a>

        <a href="https://twitter.com" target="_blank">
          <i class="fab fa-twitter"></i>
        </a>

        <a href="https://wa.me/918658302086" target="_blank">
          <i class="fab fa-whatsapp"></i>
        </a>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
